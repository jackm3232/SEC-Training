<style>
  .side_stretch-button {
    background-color: rgb(9, 133, 9);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 18px;
    margin-right: 10px;
    margin-left: 10px;
    padding-top: 5px;
    padding-bottom: 5px;
    padding-left: 15px;
    padding-right: 15px;

    transition: padding 0.15s,
    margin 0.15s;
  }

  .side_stretch-button:hover {
    padding-left: 25px;
    padding-right: 25px;
    margin-left: 0px;
    margin-right: 0px;
  }

</style>



<button class="side_stretch-button">
  One
</button>

<button class="side_stretch-button">
  Two
</button>

<button class="side_stretch-button">
  Three
</button>
